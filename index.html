<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cancionero</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🎵</text></svg>">
  <script src="bundle.js"></script>
  <style>
    body { font-family: Arial; max-width: 860px; margin: auto; padding: 20px; }
    h1.main-title { font-size: 26px; margin-bottom: 16px; }
    #search { width:100%; padding:10px; font-size:16px; margin-bottom:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:6px; }
    #theme-filter { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
    #theme-filter button { font-size:13px; padding:5px 12px; border:1px solid #ccc; border-radius:20px; background:#fff; cursor:pointer; }
    #theme-filter button:hover { background:#f0f0ee; }
    #theme-filter button.active { background:#1a7a4a; color:#fff; border-color:#1a7a4a; }
    #song-list { list-style:none; padding:0; margin:0 0 20px 0; }
    .theme-group-title { font-size:12px; font-weight:bold; text-transform:uppercase; letter-spacing:.06em; color:#999; margin:14px 0 6px 4px; }
    #song-list li { padding:9px 14px; border:1px solid #ddd; border-radius:6px; margin-bottom:5px; cursor:pointer; font-size:15px; display:flex; align-items:baseline; gap:8px; }
    #song-list li:hover { background:#f5f5f5; }
    #song-list li.active { background:#eef6f1; border-color:#1a7a4a; font-weight:bold; }
    .song-code { font-size:12px; color:#aaa; font-family:monospace; min-width:32px; }
    li.active .song-code { color:#1a7a4a; }
    #song-viewer { display:none; }
    #song-viewer h2 { font-size:22px; margin-bottom:4px; }
    #song-viewer .song-meta { font-size:13px; color:#999; margin-bottom:14px; }
    .transpose-controls { margin-bottom:16px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .transpose-controls button { font-size:16px; padding:7px 14px; border:1px solid #ccc; border-radius:6px; background:#fff; cursor:pointer; }
    .transpose-controls button:hover { background:#f0f0ee; }
    .transpose-controls .tone-label { font-size:13px; color:#888; margin-left:4px; }
    .controls-divider { width:1px; height:24px; background:#ddd; margin:0 4px; }
    #notation-toggle { margin-left:auto; font-size:14px; padding:6px 12px; }
    .font-size-controls { display:flex; gap:6px; align-items:center; }
    .font-size-controls button { font-size:14px; padding:6px 10px; }
    #song pre { font-family:'Courier New',monospace; line-height:1.7; white-space:pre-wrap; }
    #song .chord-line { color:#1a7a4a; font-weight:bold; }
  </style>
</head>
<body>

<h1 class="main-title">🎵 Cancionero Pastoral</h1>

<input type="text" id="search" placeholder="Buscar por título, código o letra..." oninput="renderList()" />
<div id="theme-filter"></div>
<ul id="song-list"></ul>

<div id="song-viewer">
  <h2 id="viewer-title"></h2>
  <p class="song-meta" id="viewer-meta"></p>
  <div class="transpose-controls">
    <button onclick="transpose(-1)">⬇️ Bajar tono</button>
    <button onclick="transpose(1)">⬆️ Subir tono</button>
    <span class="tone-label" id="tone-label"></span>
    <div class="controls-divider"></div>
    <div class="font-size-controls">
      <button onclick="changeFontSize(-1)">A-</button>
      <button onclick="changeFontSize(1)">A+</button>
    </div>
    <button id="notation-toggle" onclick="toggleNotation()">Do-Re-Mi</button>
  </div>
  <div id="song"></div>
</div>

<script>
// ── CONFIGURACIÓN ────────────────────────────────────────────────────────
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSrDH4DpWxwKH0tlNvUvtPclKxPLOjpzat8T_gjtNR6gS2talVoCf98s9G_bdP6YqlmjwLFCTkKM98Y/pub?gid=450216955&single=true&output=csv';

const THEMES = [
  "General", "Eucaristía", "María",
  "Adviento-Navidad", "Cuaresma-Pascua", "SaFa", "Aclamaciones",
];
// ─────────────────────────────────────────────────────────────────────────

const parser    = new ChordSheetJS.ChordsOverWordsParser();
const formatter = new ChordSheetJS.ChordsOverWordsFormatter();

let SONGS          = [];
let currentIndex   = null;
let transposeSteps = 0;
let song           = null;
let activeTheme    = null;
let useSpanishNotation = false;
let fontSize       = 15;

// ── TABLAS DE CONVERSIÓN ─────────────────────────────────────────────────

const ENGLISH_TO_SPANISH = {
  'C':'Do','D':'Re','E':'Mi','F':'Fa','G':'Sol','A':'La','B':'Si',
  'C#':'Do#','D#':'Re#','E#':'Mi#','F#':'Fa#','G#':'Sol#','A#':'La#','B#':'Si#',
  'Cb':'Dob','Db':'Reb','Eb':'Mib','Fb':'Fab','Gb':'Solb','Ab':'Lab','Bb':'Sib'
};

const SPANISH_TO_ENGLISH = {
  'Do':'C','Re':'D','Mi':'E','Fa':'F','Sol':'G','La':'A','Si':'B',
  'Do#':'C#','Re#':'D#','Mi#':'E#','Fa#':'F#','Sol#':'G#','La#':'A#','Si#':'B#',
  'Dob':'Cb','Reb':'Db','Mib':'Eb','Fab':'Fb','Solb':'Gb','Lab':'Ab','Sib':'Bb'
};

// ── DETECCIÓN Y NORMALIZACIÓN ────────────────────────────────────────────

/**
 * Convierte nombres de nota españoles en MAYÚSCULAS a Title Case
 * para que el resto del pipeline los procese correctamente.
 * DO → Do · SOL → Sol · LAM → Lam · RE7 → Re7 · DOM7 → Dom7
 */
function normalizeSpanishCase(text) {
  // Primero los de dos letras (SOL antes que SO, etc.)
  return text.replace(
    /\b(DO|RE|MI|FA|SOL|LA|SI)([#B]?)((?:MAJ|MIN|DIM|AUG|SUS|ADD|M)?\d*)\b/g,
    (_, note, acc, mod) =>
      note[0] + note.slice(1).toLowerCase() +   // DO→Do, SOL→Sol …
      (acc === 'B' ? 'b' : acc) +                // B bemol → b minúscula
      mod.toLowerCase()                          // MAJ→maj, M→m …
  );
}

/**
 * Detecta si el texto usa notación española, tanto en Title Case
 * (Do, Sol) como en MAYÚSCULAS (DO, SOL).
 */
function detectSpanishNotation(text) {
  return /\b(?:Do|Re|Mi|Fa|Sol|La|Si|DO|RE|MI|FA|SOL|LA|SI)[#Bb]?(?:maj|min|dim|aug|sus|add|MAJ|MIN|DIM|AUG|SUS|ADD|m|M)?\d*\b/
    .test(text);
}

/**
 * Devuelve true SOLO si toda la línea está formada por acordes + espacios.
 * Evita el falso positivo de palabras como "LA", "MI", "RE" en letras.
 * Reemplaza la lógica anterior de "eliminar acordes y comprobar lo que queda"
 * con la lógica inversa más estricta: la línea entera debe ser solo acordes.
 */
function isChordOnlyLine(line) {
  const trimmed = line.trim();
  if (!trimmed) return false;
  const withoutChords = trimmed
    // acordes ingleses
    .replace(/\b[A-G][#b]?(?:maj|min|dim|aug|sus|add|m)?\d*\b/g, '')
    // acordes españoles (title case, ya normalizados para este punto)
    .replace(/\b(?:Do|Re|Mi|Fa|Sol|La|Si)[#b]?(?:maj|min|dim|aug|sus|add|m)?\d*\b/g, '');
  // Si solo quedan espacios, es línea de acordes
  return withoutChords.trim() === '';
}

// ── CONVERSIÓN DE NOTACIÓN ────────────────────────────────────────────────

function convertChordNotation(line, toSpanish) {
  if (!line) return line;
  const map = toSpanish ? ENGLISH_TO_SPANISH : SPANISH_TO_ENGLISH;
  if (toSpanish) {
    return line.replace(/([A-G][#b]?)(?:m|maj|min|dim|aug|sus|add)?[0-9]*(\s*)/g,
      (match, noteBase, spaces) => {
        const noteMatch = match.match(/^([A-G][#b]?)((?:m|maj|min|dim|aug|sus|add)?[0-9]*)/);
        if (!noteMatch) return match;
        const [, note, modifiers] = noteMatch;
        const converted = map[note];
        if (!converted) return match;
        const lengthDiff = (converted + modifiers).length - (note + modifiers).length;
        return converted + modifiers + ' '.repeat(Math.max(0, spaces.length - lengthDiff));
      });
  } else {
    return line.replace(/(Do|Re|Mi|Fa|Sol|La|Si)([#b]?)(?:m|maj|min|dim|aug|sus|add)?[0-9]*(\s*)/g,
      (match, note, accidental, spaces) => {
        const fullMatch = match.match(/^(Do|Re|Mi|Fa|Sol|La|Si)([#b]?)((?:m|maj|min|dim|aug|sus|add)?[0-9]*)/);
        if (!fullMatch) return match;
        const [, noteName, acc, modifiers] = fullMatch;
        const fullNote = noteName + acc;
        const converted = map[fullNote];
        if (!converted) return match;
        const lengthDiff = (converted + modifiers).length - (fullNote + modifiers).length;
        return converted + modifiers + ' '.repeat(Math.max(0, spaces.length - lengthDiff));
      });
  }
}

/**
 * Aplica convertChordNotation línea a línea, usando isChordOnlyLine
 * para identificar con precisión qué líneas son de acordes.
 */
function convertTextNotation(text, toSpanish) {
  return text.split('\n').map(line =>
    isChordOnlyLine(line) ? convertChordNotation(line, toSpanish) : line
  ).join('\n');
}

function normalizeKey(key) {
  return convertChordNotation(key + ' ', false).trim();
}

function toggleNotation() {
  useSpanishNotation = !useSpanishNotation;
  document.getElementById('notation-toggle').textContent =
    useSpanishNotation ? 'C-D-E' : 'Do-Re-Mi';
  renderSong();
}

function changeFontSize(delta) {
  fontSize = Math.max(10, Math.min(24, fontSize + delta));
  renderSong();
}

// ── CARGA DESDE GOOGLE SHEETS ─────────────────────────────────────────────

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i + 1] === '"') { cell += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      row.push(cell); cell = '';
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      row.push(cell); cell = '';
      if (row.some(c => c.trim())) rows.push(row);
      row = [];
    } else {
      cell += ch;
    }
  }
  if (cell || row.length) { row.push(cell); if (row.some(c => c.trim())) rows.push(row); }
  return rows;
}

async function loadFromSheet() {
  document.getElementById('song-list').innerHTML =
    '<li style="border:none;cursor:default;color:#aaa;padding:12px 4px">Cargando canciones...</li>';
  try {
    const resp = await fetch(SHEET_CSV_URL);
    const text = await resp.text();
    const rows = parseCSV(text);

    SONGS = rows.slice(1)
      .filter(r => r[0] && r[0].trim())
      .map(r => {
        const rawChords = r[4] ? r[4].trim() : '';
        const rawKey    = r[2] ? r[2].trim() : '';

        // 1. Detectar notación española (title case o MAYÚSCULAS)
        const isSpanish = detectSpanishNotation(rawChords) || detectSpanishNotation(rawKey);

        // 2. Si es española, normalizar MAYÚSCULAS → Title Case y luego convertir a inglés
        const chordpro = isSpanish
          ? convertTextNotation(normalizeSpanishCase(rawChords), false)
          : rawChords;
        const key = isSpanish
          ? normalizeKey(normalizeSpanishCase(rawKey))
          : rawKey;

        return { code: r[0].trim(), title: r[1].trim(), key, section: r[3].trim(), chordpro };
      });

    renderThemeFilter();
    renderList();
  } catch (e) {
    document.getElementById('song-list').innerHTML =
      '<li style="border:none;cursor:default;color:#c00;padding:12px 4px">Error al cargar. Comprueba que el Google Sheet está publicado como CSV.</li>';
    console.error(e);
  }
}

// ── INTERFAZ ──────────────────────────────────────────────────────────────

function renderThemeFilter() {
  const div   = document.getElementById('theme-filter');
  const inUse = new Set(SONGS.map(s => s.section));
  const visible = THEMES.filter(t => inUse.has(t));
  div.innerHTML = ['Todas', ...visible].map(t => {
    const isActive = (t === 'Todas' && activeTheme === null) || t === activeTheme;
    const onclick  = t === 'Todas' ? 'setTheme(null)' : `setTheme('${t}')`;
    return `<button onclick="${onclick}" class="${isActive ? 'active' : ''}">${t}</button>`;
  }).join('');
}

function setTheme(theme) {
  activeTheme = theme;
  renderThemeFilter();
  renderList();
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = SONGS
    .map((s, i) => ({ ...s, index: i }))
    .filter(s => {
      if (activeTheme && s.section !== activeTheme) return false;
      if (!q) return true;
      return s.title.toLowerCase().includes(q)
          || s.code.toLowerCase().includes(q)
          || s.chordpro.toLowerCase().includes(q);
    });

  const ul = document.getElementById('song-list');
  if (!filtered.length) {
    ul.innerHTML = '<li style="border:none;cursor:default;color:#aaa;padding:12px 4px">No se encontraron canciones.</li>';
    return;
  }

  const groups = {};
  for (const s of filtered) {
    if (!groups[s.section]) groups[s.section] = [];
    groups[s.section].push(s);
  }
  const orderedThemes = THEMES.filter(t => groups[t]);

  let html = '';
  for (const theme of orderedThemes) {
    if (orderedThemes.length > 1)
      html += `<div class="theme-group-title">${theme}</div>`;
    for (const s of groups[theme]) {
      html += `<li class="${s.index === currentIndex ? 'active' : ''}" onclick="loadSong(${s.index})">
        <span class="song-code">${s.code}</span>${s.title}
      </li>`;
    }
  }
  ul.innerHTML = html;
}

function loadSong(index) {
  currentIndex   = index;
  transposeSteps = 0;
  song = parser.parse(SONGS[index].chordpro);
  renderSong();
  renderList();
  document.getElementById('song-viewer').style.display = 'block';
  document.getElementById('song-viewer').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderSong() {
  const s = SONGS[currentIndex];
  document.getElementById('viewer-title').textContent = `${s.code} · ${s.title}`;

  let currentKey = transposeSteps === 0 ? s.key : transposeChord(s.key, transposeSteps);
  if (useSpanishNotation) currentKey = convertChordNotation(currentKey, true);

  document.getElementById('viewer-meta').textContent =
    `${s.section}  ·  Tonalidad: ${currentKey}` +
    (transposeSteps !== 0 ? `  (${transposeSteps > 0 ? '+' : ''}${transposeSteps} semitonos)` : '');
  document.getElementById('tone-label').textContent =
    transposeSteps === 0 ? '' : (transposeSteps > 0 ? `+${transposeSteps}` : `${transposeSteps}`);

  let text = formatter.format(song);
  if (useSpanishNotation) text = convertTextNotation(text, true);

  const bodyLines = text.split('\n').filter(l =>
    !l.startsWith('title: ') && !l.startsWith('key: ') && !l.startsWith('capo: ')
  );

  // Usar isChordOnlyLine para colorear con precisión
  const coloredLines = bodyLines.map(line =>
    (line.trim() && isChordOnlyLine(line))
      ? `<span class="chord-line">${line}</span>`
      : line
  );

  const preElement = document.getElementById('song');
  preElement.innerHTML = '<pre>' + coloredLines.join('\n') + '</pre>';
  preElement.querySelector('pre').style.fontSize = fontSize + 'px';
}

function transposeChord(key, steps) {
  const CHROMATIC  = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const ENHARMONIC = { Db:'C#', Eb:'D#', Gb:'F#', Ab:'G#', Bb:'A#' };
  const root = ENHARMONIC[key] || key;
  const idx  = CHROMATIC.indexOf(root);
  if (idx === -1) return key;
  return CHROMATIC[((idx + steps) % 12 + 12) % 12];
}

function transpose(steps) {
  transposeSteps += steps;
  song = song.transpose(steps);
  renderSong();
}

// ── INICIO ────────────────────────────────────────────────────────────────
loadFromSheet();
</script>

</body>
</html>
