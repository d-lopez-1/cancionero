<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cancionero</title>
  <script src="bundle.js"></script>
  <style>
    body {
      font-family: Arial;
      max-width: 860px;
      margin: auto;
      padding: 20px;
    }

    h1.main-title {
      font-size: 26px;
      margin-bottom: 16px;
    }

    #search {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    #theme-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    #theme-filter button {
      font-size: 13px;
      padding: 5px 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
    }

    #theme-filter button:hover { background: #f0f0ee; }

    #theme-filter button.active {
      background: #1a7a4a;
      color: #fff;
      border-color: #1a7a4a;
    }

    #song-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px 0;
    }

    .theme-group-title {
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
      margin: 14px 0 6px 4px;
    }

    #song-list li {
      padding: 9px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 5px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    #song-list li:hover { background: #f5f5f5; }

    #song-list li.active {
      background: #eef6f1;
      border-color: #1a7a4a;
      font-weight: bold;
    }

    .song-code {
      font-size: 12px;
      color: #aaa;
      font-family: monospace;
      min-width: 32px;
    }

    li.active .song-code { color: #1a7a4a; }

    #song-viewer { display: none; }

    #song-viewer h2 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    #song-viewer .song-meta {
      font-size: 13px;
      color: #999;
      margin-bottom: 14px;
    }

    .transpose-controls { margin-bottom: 16px; }

    .transpose-controls button {
      font-size: 16px;
      padding: 7px 14px;
      margin-right: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }

    .transpose-controls button:hover { background: #f0f0ee; }

    .transpose-controls .tone-label {
      font-size: 13px;
      color: #888;
    }

    #song pre {
      font-family: 'Courier New', monospace;
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    #song .chord-line {
      color: #1a7a4a;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1 class="main-title">🎵 Cancionero Pastoral</h1>

<input type="text" id="search" placeholder="Buscar por título, código o letra..." oninput="renderList()" />
<div id="theme-filter"></div>
<ul id="song-list"></ul>

<div id="song-viewer">
  <h2 id="viewer-title"></h2>
  <p class="song-meta" id="viewer-meta"></p>
  <div class="transpose-controls">
    <button onclick="transpose(-1)">⬇️ Bajar tono</button>
    <button onclick="transpose(1)">⬆️ Subir tono</button>
    <span class="tone-label" id="tone-label"></span>
  </div>
  <div id="song"></div>
</div>

<script>
// ── CONFIGURACIÓN ────────────────────────────────────────────────────────
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSrDH4DpWxwKH0tlNvUvtPclKxPLOjpzat8T_gjtNR6gS2talVoCf98s9G_bdP6YqlmjwLFCTkKM98Y/pub?gid=450216955&single=true&output=csv';

// Orden de las secciones en la interfaz
const THEMES = [
  "General",
  "Eucaristía",
  "María",
  "Adviento-Navidad",
  "Cuaresma-Pascua",
  "SaFa",
  "Aclamaciones",
];
// ─────────────────────────────────────────────────────────────────────────

const parser    = new ChordSheetJS.ChordsOverWordsParser();
const formatter = new ChordSheetJS.ChordsOverWordsFormatter();

let SONGS          = [];
let currentIndex   = null;
let transposeSteps = 0;
let song           = null;
let activeTheme    = null;

// ── CARGA DESDE GOOGLE SHEETS ────────────────────────────────────────────

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i + 1] === '"') { cell += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      row.push(cell); cell = '';
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      row.push(cell); cell = '';
      if (row.some(c => c.trim())) rows.push(row);
      row = [];
    } else {
      cell += ch;
    }
  }
  if (cell || row.length) { row.push(cell); if (row.some(c => c.trim())) rows.push(row); }
  return rows;
}

async function loadFromSheet() {
  document.getElementById('song-list').innerHTML =
    '<li style="border:none;cursor:default;color:#aaa;padding:12px 4px">Cargando canciones...</li>';
  try {
    const resp = await fetch(SHEET_CSV_URL);
    const text = await resp.text();
    const rows = parseCSV(text);

    // Fila 0 = cabeceras (Code, Título, Key, Sección, Letra y acordes) → saltar
    // Columnas: A=0 code, B=1 title, C=2 key, D=3 section, E=4 chordpro
    SONGS = rows.slice(1)
      .filter(r => r[0] && r[0].trim())
      .map(r => ({
        code:     r[0].trim(),
        title:    r[1].trim(),
        key:      r[2].trim(),
        section:  r[3].trim(),
        chordpro: r[4].trim(),
      }));

    renderThemeFilter();
    renderList();
  } catch (e) {
    document.getElementById('song-list').innerHTML =
      '<li style="border:none;cursor:default;color:#c00;padding:12px 4px">Error al cargar. Comprueba que el Google Sheet está publicado como CSV.</li>';
    console.error(e);
  }
}

// ── INTERFAZ ─────────────────────────────────────────────────────────────

function renderThemeFilter() {
  const div   = document.getElementById('theme-filter');
  const inUse = new Set(SONGS.map(s => s.section));
  const visible = THEMES.filter(t => inUse.has(t));

  div.innerHTML = ['Todas', ...visible].map(t => {
    const isActive = (t === 'Todas' && activeTheme === null) || t === activeTheme;
    const onclick  = t === 'Todas' ? 'setTheme(null)' : `setTheme('${t}')`;
    return `<button onclick="${onclick}" class="${isActive ? 'active' : ''}">${t}</button>`;
  }).join('');
}

function setTheme(theme) {
  activeTheme = theme;
  renderThemeFilter();
  renderList();
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase().trim();

  const filtered = SONGS
    .map((s, i) => ({ ...s, index: i }))
    .filter(s => {
      if (activeTheme && s.section !== activeTheme) return false;
      if (!q) return true;
      return s.title.toLowerCase().includes(q)
          || s.code.toLowerCase().includes(q)
          || s.chordpro.toLowerCase().includes(q);
    });

  const ul = document.getElementById('song-list');

  if (!filtered.length) {
    ul.innerHTML = '<li style="border:none;cursor:default;color:#aaa;padding:12px 4px">No se encontraron canciones.</li>';
    return;
  }

  // Agrupar por sección manteniendo el orden de THEMES
  const groups = {};
  for (const s of filtered) {
    if (!groups[s.section]) groups[s.section] = [];
    groups[s.section].push(s);
  }
  const orderedThemes = THEMES.filter(t => groups[t]);

  let html = '';
  for (const theme of orderedThemes) {
    if (orderedThemes.length > 1) {
      html += `<div class="theme-group-title">${theme}</div>`;
    }
    for (const s of groups[theme]) {
      const codeTag = `<span class="song-code">${s.code}</span>`;
      html += `<li class="${s.index === currentIndex ? 'active' : ''}" onclick="loadSong(${s.index})">
        ${codeTag}${s.title}
      </li>`;
    }
  }
  ul.innerHTML = html;
}

function loadSong(index) {
  currentIndex   = index;
  transposeSteps = 0;
  song = parser.parse(SONGS[index].chordpro);
  renderSong();
  renderList();
  document.getElementById('song-viewer').style.display = 'block';
  document.getElementById('song-viewer').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderSong() {
  const s = SONGS[currentIndex];

  document.getElementById('viewer-title').textContent = `${s.code} · ${s.title}`;

  // Tonalidad: leída de la columna C (s.key), transpuesta si hace falta
  const currentKey = transposeSteps === 0
    ? s.key
    : transposeChord(s.key, transposeSteps);

  document.getElementById('viewer-meta').textContent =
    `${s.section}  ·  Tonalidad: ${currentKey}` +
    (transposeSteps !== 0 ? `  (${transposeSteps > 0 ? '+' : ''}${transposeSteps} semitonos)` : '');

  document.getElementById('tone-label').textContent =
    transposeSteps === 0 ? '' : (transposeSteps > 0 ? `+${transposeSteps}` : `${transposeSteps}`);

  // Render de la letra con acordes coloreados
  const text = formatter.format(song);
  const bodyLines = text.split('\n').filter(l =>
    !l.startsWith('title: ') && !l.startsWith('key: ') && !l.startsWith('capo: ')
  );

  const coloredLines = bodyLines.map(line => {
    if (!line.trim()) return line;
    const isChordLine = !/[a-záéíóúüñ]/i.test(
      line.replace(/[A-G][#b]?(?:m|maj|min|dim|aug|sus|add)?[0-9]*/g, '')
    );
    return isChordLine ? `<span class="chord-line">${line}</span>` : line;
  });

  document.getElementById('song').innerHTML = '<pre>' + coloredLines.join('\n') + '</pre>';
}

// Transponer la tonalidad para mostrarla en la meta-info
function transposeChord(key, steps) {
  const CHROMATIC  = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  const ENHARMONIC = { Db: 'C#', Eb: 'D#', Gb: 'F#', Ab: 'G#', Bb: 'A#' };
  const root = ENHARMONIC[key] || key;
  const idx  = CHROMATIC.indexOf(root);
  if (idx === -1) return key;
  return CHROMATIC[((idx + steps) % 12 + 12) % 12];
}

function transpose(steps) {
  transposeSteps += steps;
  song = song.transpose(steps);
  renderSong();
}

// ── INICIO ────────────────────────────────────────────────────────────────
loadFromSheet();
</script>

</body>
</html>
