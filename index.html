<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cancionero</title>

  <!-- Librería que entiende ChordPro -->
  <script src="https://cdn.jsdelivr.net/npm/chordsheetjs@12.3.1/dist/chordsheet.min.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .song {
      white-space: pre;
      font-family: monospace;
      font-size: 18px;
    }

    button {
      font-size: 18px;
      padding: 8px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h1>🎵 Cancionero Pastoral</h1>

<button onclick="transpose(-1)">⬇️ Bajar tono</button>
<button onclick="transpose(1)">⬆️ Subir tono</button>

<div id="song" class="song"></div>

<script>
const chordProText =`
{title: Nada has pensado}
{key: C}

[DO]Nada [FA]has pen[DO]sado que no puedas h[SOL]acer
[DO]Nada [FA]has soñ[DO]ado imposible de v[SOL]er
[FA]Ni en el mar, ni en el cielo, nada está lejos de ti.
Todo es[SOL]tá en tu ad[la-]entro tod[re-]o pued[SOL]es hacerlo
[DO]si te fí[FA]as de mi.
`;
// Creamos el parser de ChordPro
const parser = new ChordSheetJS.ChordProParser();
const song = parser.parse(chordProText);

// Creamos el "formateador" que dibuja la canción bonita
const formatter = new ChordSheetJS.HtmlDivFormatter();

// Mostramos la canción en la web
document.getElementById("song").innerHTML = formatter.format(song);
</script>

</body>
</html>
