<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cancionero</title>

  <!-- Librería que entiende ChordPro -->
  <script src="bundle.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/chordsheetjs@latest/dist/chordsheet.min.css">
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    
    button {
      font-size: 18px;
      padding: 8px;
      margin: 5px;
    }

    .chordsheetjs td.chord {
      text-align: center;
      vertical-align: bottom;
      padding: 0 2px;
    }
    .chordsheetjs td.lyric {
      vertical-align: top;
    }
    
  </style>
</head>

<body>

<h1>🎵 Cancionero Pastoral</h1>

<button onclick="transpose(-1)">⬇️ Bajar tono</button>
<button onclick="transpose(1)">⬆️ Subir tono</button>

<div id="song" class="song"></div>

<script>
const chordProText = `{title: Nada has pensado}
{key: C}

[C]Nada [F]has pen[C]sado que no puedas h[G]acer
[C]Nada [F]has soñ[C]ado imposible de v[G]er
[F]Ni en el mar, ni en el cielo, nada está lejos de ti.
Todo es[G]tá en tu ad[Am]entro, tod[Dm]o pued[G]es hacerlo
[C]si te fí[F]as de mi.`;

// Parser moderno
const parser = new ChordSheetJS.ChordProParser();
let song = parser.parse(chordProText);

// Render moderno
const formatter = new ChordSheetJS.HtmlTableFormatter();

function renderSong() {
  document.getElementById("song").innerHTML = formatter.format(song);
}

function transpose(steps) {
  song = song.transpose(steps);
  renderSong();
}

renderSong();
</script>

</body>
</html>
