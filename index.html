<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cancionero</title>

  <!-- Librería que entiende ChordPro -->
  <script src="bundle.js"></script>
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    button {
      font-size: 18px;
      padding: 8px;
      margin: 5px;
    }

    #song pre {
      font-family: 'Courier New', monospace;
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    #song .chord-line {
      color: #1a7a4a;
      font-weight: bold;
    }

    #song h1 {
      font-size: 22px;
      margin-bottom: 16px;
    }

    /* Buscador y lista */
    #search {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 12px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    #song-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px 0;
    }

    #song-list li {
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    #song-list li:hover {
      background: #f5f5f5;
    }

    #song-list li.active {
      background: #eef6f1;
      border-color: #1D9E75;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🎵 Cancionero Pastoral</h1>

<input type="text" id="search" placeholder="Buscar canción..." oninput="filterSongs()" />
<ul id="song-list"></ul>

<button onclick="transpose(-1)">⬇️ Bajar tono</button>
<button onclick="transpose(1)">⬆️ Subir tono</button>

<div id="song" class="song"></div>

<script>

// ── Canciones en formato ChordPro ──────────────────────────────────────────
const SONGS = [
  {
    title: "Nada has pensado",
    chordpro: `{title: Nada has pensado}
    {key: C}
    [C]Nada [F]has pen[C]sado que no puedas h[G]acer
    [C]Nada [F]has soñ[C]ado imposible de v[G]er
    [F]Ni en el mar, ni en el cielo, nada está lejos de ti.
    Todo es[G]tá en tu ad[Am]entro, tod[Dm]o pued[G]es hacerlo
    [C]si te fí[F]as de mi.`
  },

  {
    title: "Nada nos separará",
    chordpro: `{title: Nada nos separará}
    {key: C}
    [C]Nada nos se[F]par[C]ará, (nada nos se[F]par[C]ará)
    [C]Nada nos se[F]par[C]ará, (nada nos se[F]par[C]ará)
    [C]Nada nos s[Em]epar[Am]ará[F] del a[G]mor de [C]Dios`
  }

  // ← Añade más canciones aquí, separadas por comas
];
// ──────────────────────────────────────────────────────────────────────────


// Parser y formatter
const parser    = new ChordSheetJS.ChordProParser();
const formatter = new ChordSheetJS.ChordsOverWordsFormatter();

let currentIndex = 0;
let song = parser.parse(SONGS[0].chordpro);

// Carga una canción por índice y resetea la transposición
function loadSong(index) {
  currentIndex = index;
  song = parser.parse(SONGS[index].chordpro);
  renderSong();
  renderList();
}

// Render del visor
function renderSong() {
  const text = formatter.format(song);
  // Extraer título (primera línea "title: ...")
  const lines = text.split('\n');
  let title = '';
  const bodyLines = [];
  for (const line of lines) {
    if (line.startsWith('title: ')) { title = line.replace('title: ', ''); }
    else if (line.startsWith('key: ') || line.startsWith('capo: ')) { /* omitir */ }
    else { bodyLines.push(line); }
  }
  // Colorear líneas de acordes (las que no contienen letras minúsculas)
  const coloredLines = bodyLines.map(line => {
    if (line.trim() === '') return line;
    const isChordLine = !/[a-záéíóúüñ]/i.test(line.replace(/[A-G][#b]?(?:m|maj|min|dim|aug|sus|add)?[0-9]*/g, ''));
    if (isChordLine && line.trim()) return `<span class="chord-line">${line}</span>`;
    return line;
  });
  document.getElementById("song").innerHTML =
    (title ? `<h1>${title}</h1>` : '') +
    '<pre>' + coloredLines.join('\n') + '</pre>';
}

// Transponer (igual que antes)
function transpose(steps) {
  song = song.transpose(steps);
  renderSong();
}

// Render de la lista filtrando por búsqueda
function renderList() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const filtered = SONGS
    .map((s, i) => ({ ...s, index: i }))
    .filter(s => !q || s.title.toLowerCase().includes(q) || s.chordpro.toLowerCase().includes(q));

  const ul = document.getElementById("song-list");
  ul.innerHTML = filtered.map(s =>
    `<li class="${s.index === currentIndex ? 'active' : ''}" onclick="loadSong(${s.index})">
      ${s.title}
    </li>`
  ).join('');
}

function filterSongs() {
  renderList();
}

// Inicio
renderList();
renderSong();
</script>

</body>
</html>
